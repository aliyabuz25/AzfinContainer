services:
  azfin-backend:
    container_name: azfin-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      UPLOADS_DIR: "/app/uploads"
      CURRENT_SITE_CONTENT_PATH: "/app/uploads/current-site-content.json"
      CURRENT_SITEMAP_PATH: "/app/uploads/current-sitemap.json"
      CURRENT_SMTP_SETTINGS_PATH: "/app/uploads/current-smtp-settings.json"
      SNAPSHOT_DIR: "/app/uploads/_snapshots"
      CHANGE_LOG_PATH: "/app/uploads/_change-log.ndjson"
      DB_PATH: "/app/uploads/azfin_db.sqlite"
    volumes:
      - azfin-uploads:/app/uploads
    networks:
      - edge
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=edge'
      - 'traefik.http.routers.azfin-api.rule=(Host(`azfin.az`) || Host(`azfin.octotech.az`)) && (PathPrefix(`/api`) || PathPrefix(`/uploads`))'
      - 'traefik.http.routers.azfin-api.entrypoints=web'
      - 'traefik.http.routers.azfin-api.priority=100'
      - 'traefik.http.services.azfin-api.loadbalancer.server.port=3001'

  azfin-frontend:
    container_name: azfin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - edge
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=edge'
      - 'traefik.http.routers.azfin.rule=Host(`azfin.az`) || Host(`azfin.octotech.az`)'
      - 'traefik.http.routers.azfin.entrypoints=web'
      - 'traefik.http.services.azfin.loadbalancer.server.port=901'

networks:
  edge:
    external: true

volumes:
  azfin-db-data:
  azfin-uploads:
